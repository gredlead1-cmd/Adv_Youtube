<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 16px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 14px;
      color: #fff;
    }

    .master-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e1e;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .master-toggle span {
      font-size: 14px;
      font-weight: 500;
    }

    /* iOS-style toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #ff0000; }
    input:checked + .slider::before { transform: translateX(18px); }

    .stats {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    .stats span {
      color: #ff0000;
      font-weight: 600;
    }

    .open-settings-btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
      margin-bottom: 8px;
    }

    .open-settings-btn:hover { background: #cc0000; }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🎬 YouTube Filter</h2>

  <div class="master-toggle">
    <span>Enable Filter</span>
    <label class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats" id="stats">
    Loading settings…
  </div>

  <button class="open-settings-btn" id="openSettings">⚙️ Open Full Settings</button>

  <div class="footer">YouTube Advanced Keyword Filter v2.0</div>

  <script src="browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
